<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- instant.page: 悬停导航链接即预加载，点击瞬间切换 -->
<script type="speculationrules">
{
  "prerender": [{
    "source": "document",
    "where": {
      "and": [
        { "not": { "href_matches": "/*\\.(zip|pdf|png|jpg|jpeg|gif|svg|webp)" } },
        { "not": { "selector_matches": "[data-no-instant]" } }
      ]
    },
    "eagerness": "moderate"
  }]
}
</script>

<!-- 预连接优化 -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<meta name="theme-color" content="#0a0a0b">
